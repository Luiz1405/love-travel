name: Workflow Love Travel

on:
  push:
    branches:[ "main", "dev"]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres_db:
        image: postgres:15
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: ${DB_TEST_USERNAME}
          POSTGRES_PASSWORD: ${DB_TEST_PASSWORD}
          POSTGRES_DB: ${DB_TEST_DATABASE}
    
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Lint
      run: npm run lint

    - name: Build Project
      run: npm run build

